# Data Manifest Template
# ======================
# Submit one manifest per participant per dataset version.
# Run: python validate_manifest.py <this-file> --task <task>

participant_id: ""          # Unique participant identifier
dataset_version: "1.0"
schema_version: "1.0"

record_count: 0
feature_completeness: 1.0   # Fraction of non-null features (0.0-1.0)

label_distribution:          # Class label -> proportion
  "0": 0.0
  "1": 0.0

time_range:
  start: ""                  # ISO 8601 (e.g. 2025-01-01)
  end: ""

population_description: ""   # Brief description of the data population

validation:
  status: pending            # pending | passed | failed
  timestamp: ""              # ISO 8601 timestamp of validation
  validator_version: "1.0"

checksum: ""                 # SHA-256 of the data file
approval: ""                 # Approver name or role
