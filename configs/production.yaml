# FL Platform — Production Environment
# ======================================
# Full-scale production deployment.
# All security controls (mTLS, SecAgg, DP) must be enabled.

server:
  host: ""              # Production coordinator IP
  private_ip: ""
  instance_type: g6.8xlarge
  memory: 120g
  cpus: 30
  shm_size: 8g

clients:
  hosts: []             # Production client IPs
  num_clients: 5
  instance_type: g6.4xlarge
  memory: 56g
  cpus: 14

ssh:
  key_path: ""          # Path to production SSH key
  user: ec2-user

tls:
  certs_dir: /home/ec2-user/fl-deploy/certs
  cert_days: 365
  cert_cn: fl-coordinator

network:
  grpc_port: 9092
  vpc_id: ""
  subnet_id: ""

docker:
  image: healthcare-fl
  tag: ""               # MUST use semantic version (e.g. v1.2.3), never 'latest'
  registry: ""          # Private ECR registry

training:
  timeout_default: 3600
  timeout_large: 54000
  timeout_medium: 7200
  round_timeout: 120

privacy:
  dp_preset: DP_STRONG  # Production MUST use DP_STRONG or stricter
  secagg: true          # SecAgg MUST be enabled in production

monitoring:
  log_driver: awslogs
  log_max_size: 200m
  log_max_file: 5

backup:
  backup_dir: /home/ec2-user/fl-deploy/backups
  s3_bucket: ""         # Required for production
  retention_days: 90

aws:
  region: ap-southeast-1
  profile: ""
