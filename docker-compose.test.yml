# Test all models x tasks
# Usage: docker compose -f docker-compose.test.yml up --build

services:
  test:
    build: .
    command: python tests/run_all.py
    environment:
      - SYNTHETIC=1
      - DATA_PATH=/data/flower_data
      - MAX_SAMPLES=1000
    volumes:
      - ./flower_data:/data/flower_data:ro
