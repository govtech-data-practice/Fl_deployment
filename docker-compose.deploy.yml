# Secure distributed deployment: SuperLink + SuperNodes with TLS
#
# Setup:
#   ./deploy/gen_certs.sh          # generate TLS certs (one time)
#   docker compose -f docker-compose.deploy.yml up --build
#
# Then submit experiment:
#   flwr run ./sepsis local-deployment --run-config "strategy=IID num-rounds=3 num-clients=2"

services:
  superlink:
    build: .
    command: >
      flower-superlink
        --ssl-certfile /certs/server.pem
        --ssl-keyfile /certs/server.key
        --ssl-ca-certfile /certs/ca.pem
    ports:
      - "9091:9091"
      - "9092:9092"
      - "9093:9093"
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.connect((\"localhost\",9092)); s.close()'"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fl-net

  supernode-0:
    build: .
    command: >
      flower-supernode
        --root-certificates /certs/ca.pem
        --superlink superlink:9092
        --node-config 'partition-id=0 num-clients=2 data-path="/data/flower_data" max-samples=1000'
        --clientappio-api-address 0.0.0.0:7070
    volumes:
      - ./certs/ca.pem:/certs/ca.pem:ro
      - ./flower_data:/data/flower_data:ro
    depends_on:
      superlink:
        condition: service_healthy
    networks:
      - fl-net

  supernode-1:
    build: .
    command: >
      flower-supernode
        --root-certificates /certs/ca.pem
        --superlink superlink:9092
        --node-config 'partition-id=1 num-clients=2 data-path="/data/flower_data" max-samples=1000'
        --clientappio-api-address 0.0.0.0:7070
    volumes:
      - ./certs/ca.pem:/certs/ca.pem:ro
      - ./flower_data:/data/flower_data:ro
    depends_on:
      superlink:
        condition: service_healthy
    networks:
      - fl-net

networks:
  fl-net:
