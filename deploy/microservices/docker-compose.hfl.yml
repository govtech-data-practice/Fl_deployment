# HFL Microservices — Full Architecture
# ========================================
# Coordinator + N clients + DP Accountant + Model Registry + Monitoring
#
# Prerequisites:
#   docker build -t healthcare-fl:latest -f deploy/docker/Dockerfile.gpu .
#
# Usage:
#   docker compose -f docker-compose.hfl.yml up -d
#   FL_TASK=sepsis NUM_CLIENTS=3 docker compose -f docker-compose.hfl.yml up -d

services:

  coordinator:
    image: healthcare-fl:latest
    container_name: fl-coordinator
    command: python3 runners/run_ec2.py ${FL_TASK:-fraud} --synthetic
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-fraud}
      NUM_ROUNDS: ${NUM_ROUNDS:-5}
      NUM_CLIENTS: ${NUM_CLIENTS:-2}
    ports:
      - "9092:9092"
    volumes:
      - coordinator-results:/app/results
    networks:
      - fl-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',9092)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  client-0:
    image: healthcare-fl:latest
    container_name: fl-client-0
    command: python3 runners/run_client.py --server coordinator:9092 --partition-id 0 --num-clients ${NUM_CLIENTS:-2} --task ${FL_TASK:-fraud}
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-fraud}
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - fl-network

  client-1:
    image: healthcare-fl:latest
    container_name: fl-client-1
    command: python3 runners/run_client.py --server coordinator:9092 --partition-id 1 --num-clients ${NUM_CLIENTS:-2} --task ${FL_TASK:-fraud}
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-fraud}
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - fl-network

  dp-accountant:
    image: healthcare-fl:latest
    container_name: fl-dp-accountant
    command: python3 runners/svc_dp.py
    environment:
      PORT: "8081"
    ports:
      - "8081:8081"
    networks:
      - fl-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  model-registry:
    image: healthcare-fl:latest
    container_name: fl-model-registry
    command: python3 runners/svc_model_registry.py
    environment:
      PORT: "8083"
    ports:
      - "8083:8083"
    volumes:
      - model-store:/tmp/models
    networks:
      - fl-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: fl-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - fl-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fl-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - fl-network
    restart: unless-stopped

volumes:
  coordinator-results:
  model-store:

networks:
  fl-network:
    driver: bridge
