global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "fl-services"
    static_configs:
      - targets:
          - "dp-accountant:8081"
          - "dp-service:8085"
          - "model-registry:8083"
          - "psa-service:8084"
          - "audit-logger:8086"
    metrics_path: /health
    scheme: http
