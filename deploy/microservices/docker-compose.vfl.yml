# VFL Microservices — Full Architecture
# ========================================
# Coordinator + 3 Parties + PSA + DP Service + Audit Logger + Monitoring
#
# Prerequisites:
#   docker build -t healthcare-fl:latest -f deploy/docker/Dockerfile.gpu .
#
# Usage:
#   docker compose -f docker-compose.vfl.yml up -d
#   docker compose -f docker-compose.vfl.yml logs -f coordinator

services:

  coordinator:
    image: healthcare-fl:latest
    container_name: vfl-coordinator
    command: python3 runners/run_ec2.py ${FL_TASK:-vfl_fraud} --synthetic
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-vfl_fraud}
      NUM_ROUNDS: ${NUM_ROUNDS:-5}
      NUM_CLIENTS: ${NUM_CLIENTS:-3}
    ports:
      - "9092:9092"
    networks:
      - vfl-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',9092)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  party-0:
    image: healthcare-fl:latest
    container_name: vfl-party-0
    command: python3 runners/run_client.py --server coordinator:9092 --partition-id 0 --num-clients ${NUM_CLIENTS:-3} --task ${FL_TASK:-vfl_fraud}
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-vfl_fraud}
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - vfl-network

  party-1:
    image: healthcare-fl:latest
    container_name: vfl-party-1
    command: python3 runners/run_client.py --server coordinator:9092 --partition-id 1 --num-clients ${NUM_CLIENTS:-3} --task ${FL_TASK:-vfl_fraud}
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-vfl_fraud}
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - vfl-network

  party-2:
    image: healthcare-fl:latest
    container_name: vfl-party-2
    command: python3 runners/run_client.py --server coordinator:9092 --partition-id 2 --num-clients ${NUM_CLIENTS:-3} --task ${FL_TASK:-vfl_fraud}
    environment:
      SYNTHETIC: "1"
      FL_TASK: ${FL_TASK:-vfl_fraud}
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - vfl-network

  psa-service:
    image: healthcare-fl:latest
    container_name: vfl-psa
    command: python3 runners/svc_psa.py
    environment:
      PORT: "8084"
    ports:
      - "8084:8084"
    networks:
      - vfl-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8084/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dp-service:
    image: healthcare-fl:latest
    container_name: vfl-dp
    command: python3 runners/svc_dp.py
    environment:
      PORT: "8085"
    ports:
      - "8085:8085"
    networks:
      - vfl-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8085/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  audit-logger:
    image: healthcare-fl:latest
    container_name: vfl-audit
    command: python3 runners/svc_audit.py
    environment:
      PORT: "8086"
    ports:
      - "8086:8086"
    volumes:
      - audit-logs:/app/audit_logs
    networks:
      - vfl-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8086/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: vfl-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - vfl-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: vfl-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - vfl-network
    restart: unless-stopped

volumes:
  audit-logs:

networks:
  vfl-network:
    driver: bridge
