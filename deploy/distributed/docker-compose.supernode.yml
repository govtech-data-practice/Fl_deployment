# SuperNode + ClientApp — runs on each client EC2
#
# Usage:
#   SUPERLINK_IP=172.31.x.x PARTITION_ID=0 NUM_CLIENTS=2 FL_TASK=fraud \
#     docker compose -f docker-compose.supernode.yml up -d

services:
  supernode:
    image: healthcare-fl:latest
    container_name: fl-supernode
    restart: unless-stopped
    command: >
      flower-supernode
        --insecure
        --superlink ${SUPERLINK_IP}:9092
        --clientappio-api-address 0.0.0.0:7070
        --node-config "partition-id=${PARTITION_ID:-0} num-clients=${NUM_CLIENTS:-2} task=${FL_TASK:-fraud}"
    environment:
      FL_TASK: ${FL_TASK:-fraud}
      PARTITION_ID: ${PARTITION_ID:-0}
      NUM_CLIENTS: ${NUM_CLIENTS:-2}
      SYNTHETIC: ${SYNTHETIC:-1}
      DATA_PATH: /data
      PYTHONUNBUFFERED: "1"
    ports:
      - "7070:7070"
    volumes:
      - ./certs:/certs:ro
      - ./data:/data:ro
      - ./logs/supernode:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  clientapp:
    image: healthcare-fl:latest
    container_name: fl-clientapp
    command: >
      flwr run . client
        --app runners.client_app:app
        --insecure
        --supernode supernode:7070
    environment:
      FL_TASK: ${FL_TASK:-fraud}
      PARTITION_ID: ${PARTITION_ID:-0}
      NUM_CLIENTS: ${NUM_CLIENTS:-2}
      SYNTHETIC: ${SYNTHETIC:-1}
    depends_on:
      - supernode
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
