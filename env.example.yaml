# FL Platform Configuration — YAML format
# =========================================
# Copy this file to env.yaml and fill in values.
# DO NOT commit env.yaml to version control.
#
# For shell-format configuration, see: deploy/cluster.env.template

server:
  host: ""                          # Server public IP (e.g. 54.x.x.x)
  private_ip: ""                    # Server private IP within VPC
  instance_type: g6.8xlarge
  memory: 120g
  cpus: 30
  shm_size: 8g

clients:
  hosts: []                         # List of client IPs
  num_clients: 5
  instance_type: g6.4xlarge
  memory: 56g
  cpus: 14

ssh:
  key_path: ""                      # Path to SSH private key
  user: ec2-user

tls:
  certs_dir: /home/ec2-user/fl-deploy/certs
  cert_days: 365
  cert_cn: fl-coordinator

network:
  grpc_port: 9092
  vpc_id: ""
  subnet_id: ""

docker:
  image: healthcare-fl
  tag: latest                       # Use semantic versions in production
  registry: ""                      # Private registry URL

data:
  data_dir: /home/ec2-user/fl-deploy/data
  results_dir: /home/ec2-user/fl-deploy/results

training:
  timeout_default: 3600             # Per-task timeout (seconds)
  timeout_large: 54000              # Large model tasks (chest, transfer)
  timeout_medium: 7200              # Medium tasks (ecg, satellite)
  round_timeout: 120                # Per-round timeout

privacy:
  dp_preset: DP_STRONG              # DP_STRONG | DP_MODERATE | DP_RELAXED
  # Custom DP (overrides preset):
  # sigma: 1.5
  # max_norm: 1.0
  # delta: 1.0e-5
  secagg: true

monitoring:
  log_max_size: 200m
  log_max_file: 5
  log_driver: json-file             # json-file | awslogs

backup:
  backup_dir: /home/ec2-user/fl-deploy/backups
  s3_bucket: ""                     # Optional S3 bucket for remote backups
  retention_days: 30

aws:
  region: ap-southeast-1
  profile: ""
