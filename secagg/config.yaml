# SecAgg+ Configuration
# =====================
# Pairwise deterministic masking — masks cancel when summed across all clients.
# No trusted third party required.

# Scale of random masks (controls mask magnitude relative to model updates)
scale: 0.01

# Minimum number of clients required for SecAgg to proceed
# If fewer clients are available, training halts (fail-closed)
min_quorum: 2

# Maximum abort rate before raising an alarm (see Operations chapter)
# Alarm: SecAgg abort rate >20% triggers P2 alert
max_abort_rate: 0.20

# Round seed strategy: "sequential" (round number) or "random"
seed_strategy: sequential

# Dropout tolerance: if a client drops mid-round, SecAgg can still
# complete if at least min_quorum clients finish
dropout_tolerant: true
